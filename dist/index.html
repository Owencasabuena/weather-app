<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
</head>
<body>
    <main class="app-container">
        
        <form class="weather-form">
            <input 
                type="text" 
                class="city-input" 
                placeholder="Enter city name..." 
                required
            >
            <ul class="suggestions-dropdown hidden"></ul>
            <button type="submit">Search</button>
        </form>

        <div class="error-message"></div>

        <div class="loading-spinner hidden">Loading weather data...</div>

        <section class="weather-display hidden">
            <h2 class="city-name">--</h2>
            
            <div class="weather-info">
                <div class="temp-container">
                    <span class="temp">--</span>°C
                </div>

                <div class="humidity-container">
                    Humidity: <span class="humidity">--</span>%
                </div>

                <img src="" alt="Weather Icon" class="icon">
            </div>
        </section>

    </main>

    <script defer src="main.js"></script>
</body>
</html>
